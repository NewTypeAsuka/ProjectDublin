spring:
  datasource:
    url: jdbc:h2:mem:projectdublin-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

aws:
  s3:
    bucket: projectdublin-test-images
    region: ap-northeast-2
    access-key:
    secret-key:
    key-prefix: articles
    public-base-url:
    max-file-size: 10MB

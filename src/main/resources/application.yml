spring: # 스프링부트 설정
  jpa:
    # 전송 쿼리 확인
    show-sql: true
    properties:
      hibernate:
        format_sql: true

    # 테이블 생성 후에 data.sql 실행
    defer-datasource-initialization: true

  datasource:
    url: jdbc:h2:mem:testdb # h2 데이터베이스 URL

  h2:
    console:
        enabled: true # h2 콘솔 활성화(http://localhost:8080/h2-console)
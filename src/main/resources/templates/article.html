<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog::포스트✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .intro-header__title-link,
        .intro-header__title-link:visited,
        .intro-header__title-link:hover,
        .intro-header__title-link:focus,
        .intro-header__title-link:active { /* NewTypeBlog 타이틀 링크 스타일 */
            color: inherit;
            text-decoration: none;
        }

        .site-nav { /* 스크롤 시 nav 영역이 사라지지 않고 상단에 고정되도록 설정 */
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: background-color 0.22s ease, box-shadow 0.22s ease;
        }
        .site-nav.is-stuck {
            background-color: rgba(108, 117, 125, 0.96) !important;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .site-nav .nav-link {
            transition: color 0.18s ease, transform 0.18s ease;
        }
        .site-nav .nav-link:hover,
        .site-nav .nav-link:focus {
            transform: translateY(-1px);
        }
        .site-nav__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
        }
        .site-nav__menu {
            display: flex;
            align-items: center;
            min-width: 0;
            gap: 0.15rem;
        }
        .site-nav-dropdown {
            position: relative;
            margin: 0;
        }
        .site-nav-dropdown > summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            min-width: 2.5rem;
            height: 2.5rem;
            padding: 0 0.8rem;
            border-radius: 0.35rem;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            list-style: none;
            user-select: none;
            transition: color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
        }
        .site-nav-dropdown > summary::-webkit-details-marker {
            display: none;
        }
        .site-nav-dropdown > summary:hover,
        .site-nav-dropdown > summary:focus {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
            outline: none;
        }
        .site-nav-dropdown[open] > summary {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.12);
        }
        .site-nav-dropdown__icon {
            display: inline-block;
            width: 0.6rem;
            height: 0.6rem;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg) translateY(-1px);
        }
        .site-nav-dropdown__menu {
            position: absolute;
            top: calc(100% + 0.45rem);
            left: 0;
            min-width: 13rem;
            padding: 0.5rem;
            border-radius: 0.8rem;
            background-color: #ffffff;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.18);
            z-index: 1040;
        }
        .site-nav-dropdown__item {
            display: block;
            padding: 0.6rem 0.75rem;
            border-radius: 0.55rem;
            font-size: 0.92rem;
            line-height: 1.35;
            color: #5f6b7a;
            background-color: #f8f9fa;
            text-decoration: none;
        }
        .site-nav-dropdown__item:hover,
        .site-nav-dropdown__item:focus {
            color: #1f2937;
            background-color: #eef2f7;
            text-decoration: none;
            outline: none;
        }
        .site-nav__actions {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .site-nav__actions .btn {
            margin: 0;
            white-space: nowrap;
        }
        .article-content iframe {
            max-width: 100%;
        }
        .article-content img {
            max-width: 100%;
            height: auto;
        }
        .article-content iframe {
            aspect-ratio: 16 / 9;
            width: 100%;
            height: auto;
        }
        .article-like {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .article-like__button {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.55rem 0.9rem;
            border: 1px solid #dee2e6;
            border-radius: 999px;
            color: #6c757d;
            background-color: #ffffff;
            transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }
        .article-like__button:hover,
        .article-like__button:focus {
            border-color: #e03131;
            color: #e03131;
            outline: none;
            transform: translateY(-1px);
        }
        .article-like__button:disabled {
            cursor: wait;
            opacity: 0.65;
            transform: none;
        }
        .article-like__button.is-liked {
            border-color: #e03131;
            color: #e03131;
        }
        .article-like__icon {
            font-size: 1.5rem;
            line-height: 1;
        }
        .article-like__count {
            min-width: 1ch;
            color: inherit;
            font-weight: 600;
        }
        .article-pin__button {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.55rem 0.9rem;
            border: 1px solid #dee2e6;
            border-radius: 999px;
            color: #6c757d;
            background-color: #ffffff;
            transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
        }
        .article-pin__button:hover,
        .article-pin__button:focus,
        .article-pin__button.is-pinned {
            border-color: #ffc107;
            color: #856404;
            background-color: #fff9db;
            outline: none;
        }
        .article-pin__button:hover,
        .article-pin__button:focus {
            transform: translateY(-1px);
        }
        .article-pin__button:disabled {
            cursor: wait;
            opacity: 0.65;
            transform: none;
        }
        .article-detail-card {
            position: relative;
            overflow: hidden;
        }
        .pinned-corner {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 0;
            height: 0;
            border-top: 2.75rem solid #ffc107;
            border-right: 2.75rem solid transparent;
        }
        @media (min-width: 992px) {
            .site-nav__inner {
                max-width: 800px;
            }
        }
        @media (min-width: 1200px) {
            .site-nav__inner {
                max-width: 855px;
            }
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="site-header bg-white border-bottom">
        <div class="container py-4 py-md-5 text-center">
            <a href="/" class="intro-header__title-link">
                <h1 class="h2 mb-2">✨NewTypeBlog✨</h1>
            </a>
        </div>
    </header>

    <nav class="navbar navbar-dark bg-secondary py-2 site-nav" id="site-nav">
        <div class="container site-nav__inner">
            <div class="navbar-nav flex-row site-nav__menu">
                <details class="site-nav-dropdown">
                    <summary aria-label="메뉴 열기">
                        <span>메뉴</span>
                        <span class="site-nav-dropdown__icon" aria-hidden="true"></span>
                    </summary>
                    <div class="site-nav-dropdown__menu">
                        <a class="site-nav-dropdown__item" href="/">홈</a>
                        <!-- 추후 다른 기능으로 이동하는 링크 항목 추가 -->
                    </div>
                </details>
            </div>
            <div class="site-nav__actions">
                <button type="button"
                        onclick="location.href='/new-article'"
                        class="btn btn-primary btn-sm">글쓰기</button>
                <button type="button" class="btn btn-outline-light btn-sm" onclick="location.href='/logout'">로그아웃</button>
            </div>
        </div>
    </nav>

    <main class="container flex-fill py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="card border-0 shadow-sm article-detail-card">
                    <span id="pinned-corner" class="pinned-corner"
                          th:classappend="${article.pinned} ? '' : ' d-none'">
                        <span class="sr-only">고정 게시글</span>
                    </span>
                    <div class="card-body p-4 p-md-5">
                        <input type="hidden" id="article-id" th:value="${article.id}">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-4">
                            <!-- <div class="mb-3 mb-lg-0">
                                <div class="text-uppercase text-muted small mb-2">Article Detail</div>
                                <h2 class="h4 mb-0">게시글</h2>
                            </div> -->
                            <div class="text-muted small">
                                <span th:text="|Posted on ${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')} by ${article.author}|"></span>
                                <span aria-hidden="true"> · </span>
                                <span th:text="|조회수 ${article.viewCount}|"></span>
                                <span aria-hidden="true"> · </span>
                                <span>좋아요 <span id="article-like-count" th:text="${article.likeCount}"></span></span>
                            </div>
                        </div>

                        <article>
                            <header class="border-bottom pb-3 mb-4">
                                <h1 class="h2 mb-0 text-break" th:text="${article.title}"></h1>
                            </header>
                            <section class="mb-4">
                                <div class="mb-0 text-break article-content" th:utext="${article.content}"></div>
                            </section>
                            <div class="article-like border-top pt-4 mb-4">
                                <button type="button" id="like-btn"
                                        class="article-like__button"
                                        aria-label="좋아요"
                                        aria-pressed="false"
                                        disabled>
                                    <span id="like-icon" class="article-like__icon" aria-hidden="true">♡</span>
                                    <span>좋아요</span>
                                    <span id="like-count" class="article-like__count">0</span>
                                </button>
                                <button type="button" id="pin-btn"
                                        th:if="${isAdmin}"
                                        class="article-pin__button"
                                        th:classappend="${article.pinned} ? ' is-pinned'"
                                        th:attr="data-pinned=${article.pinned},aria-pressed=${article.pinned}"
                                        aria-label="글 고정">
                                    <span aria-hidden="true">📌</span>
                                    <span id="pin-label"
                                          th:text="${article.pinned} ? '고정 해제' : '글 고정'"></span>
                                </button>
                            </div>
                            <div class="d-flex flex-wrap">
                                <button type="button" id="edit-btn"
                                        th:onclick="|location.href='@{/new-article?id={articleId}(articleId=${article.id})}'|"
                                        class="btn btn-primary btn-sm mr-2 mb-2">수정</button>
                                <button type="button" id="delete-btn"
                                        class="btn btn-outline-secondary btn-sm mb-2">삭제</button>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-white border-top">
        <div class="container py-3 text-center text-secondary small">
            &copy; 2026 NewTypeAsuka. All rights reserved.
        </div>
    </footer>

    <script>
        const siteHeader = document.querySelector('.site-header');
        const siteNav = document.getElementById('site-nav');

        if (siteHeader && siteNav) {
            const syncStickyNavState = function () {
                siteNav.classList.toggle('is-stuck', siteHeader.getBoundingClientRect().bottom <= 0);
            };

            syncStickyNavState();
            window.addEventListener('scroll', syncStickyNavState, { passive: true });
            window.addEventListener('resize', syncStickyNavState);
        }
    </script>
    <script src="/js/articleLike.js"></script>
    <script src="/js/articlePin.js"></script>
    <script src="/js/article.js"></script>
</body>
</html>

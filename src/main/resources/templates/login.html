<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .gradient-custom {
            background: linear-gradient(45deg, rgba(37, 117, 252, 1), rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));
            background-size: 200% 200%;
            animation: gradientAnimation 5s ease infinite;
        }
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="gradient-custom">
    <section class="d-flex vh-100">
        <div class="container-fluid row justify-content-center align-content-center">
            <div class="card bg-dark" style="border-radius: 1rem; width: 400px;">
                <div class="card-body p-5 text-center">
                    <h2 class="text-white">LOGIN</h2>
                    <p class="text-white-50 mt-2 mb-5">로그인을 해주세요!</p>
                        <!-- <form action="/login" method="POST">
                            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                            <div class="mb-3">
                                <label class="form-label text-white">이메일</label>
                                <input type="email" class="form-control" name="username">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">비밀번호</label>
                                <input type="password" class="form-control" name="password">
                            </div>
                            <button type="submit" class="btn btn-primary">로그인</button>
                        </form>
                        <button type="button" class="btn btn-secondary mt-3" onclick="location.href='/signup'">회원가입</button> -->
                    <form action="/login" method="POST">
                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                        <div class="mb-3">
                            <label class="form-label text-white">이메일</label>
                            <input type="email" class="form-control" name="username" placeholder="이메일을 입력하세요">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">비밀번호</label>
                            <input type="password" class="form-control" name="password" placeholder="비밀번호를 입력하세요">
                        </div>
                        <div class="text-danger" style="height: 20px; font-size: 14px;">아이디와 비밀번호를 확인해주세요</div>
                        <div class="row mt-4">
                            <div class="col-6 pr-1">
                                <button type="submit" class="btn btn-primary btn-block">로그인</button>
                            </div>
                            <div class="col-6 pl-1">
                                <button type="button" class="btn btn-secondary btn-block" onclick="location.href='/signup'">회원가입</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 가입</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .gradient-custom {
            background: linear-gradient(45deg, rgba(16, 185, 129, 1), rgba(59, 130, 246, 1), rgba(168, 85, 247, 1));
            background-size: 200% 200%;
            animation: gradientAnimation 5s ease infinite;
        }
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="gradient-custom">
    <section class="d-flex vh-100">
        <div class="container-fluid row justify-content-center align-content-center">
            <div class="card bg-dark" style="border-radius: 1rem; width: 400px;">
                <div class="card-body p-5 text-center">
                    <h2 class="text-white">SIGN UP</h2>
                    <p class="text-white-50 mt-2 mb-5">회원가입을 진행해주세요!</p>
                    <!-- <div class = "mb-2">
                        <form th:action="@{/user}" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-white">이메일</label>
                                <input type="email" class="form-control" name="email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">비밀번호</label>
                                <input type="password" class="form-control" name="password">
                            </div>
                            <button type="submit" class="btn btn-primary">회원가입</button>
                        </form>
                    </div> -->
                    <form th:action="@{/user}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-white">이메일</label>
                            <input type="email" class="form-control" name="email" placeholder="이메일을 입력하세요">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">비밀번호</label>
                            <input type="password" class="form-control" name="password" placeholder="비밀번호를 입력하세요">
                        </div>
                        <div class="text-danger" style="height: 20px; font-size: 14px;">비밀번호는 8자 이상 20자 이하로, 하나 이상의 영문자, 숫자를 포함해야 합니다</div>
                        <div class="row mt-4">
                            <div class="col-6 pr-1">
                                <button type="submit" class="btn btn-primary btn-block">회원가입</button>
                            </div>
                            <div class="col-6 pl-1">
                                <button type="button" class="btn btn-secondary btn-block" onclick="location.href='/login'">뒤로가기</button>
                            </div>
                        </div>
                    </form>    
                </div>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog::로그인✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .gradient-custom { /* 배경색과 애니메이션 */
            background: linear-gradient(135deg,
                rgba(16, 185, 129, 1),
                rgba(59, 130, 246, 1),
                rgba(99, 102, 241, 1),
                rgba(236, 72, 153, 1),
                rgba(251, 191, 36, 1)
            );
            background-size: 300% 300%;
            animation: gradientAnimation 30s ease-in-out infinite;
        }
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 30%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 70%; }
            100% { background-position: 0% 50%; }
        }

        .google-login-link.is-loading { /* 로딩 상태를 나타내는 애니메이션 */
            pointer-events: none;
            opacity: 0.7;
        }
        .google-login-loading {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.35s ease;
            margin-top: 0;
        }
        .google-login-loading.is-visible {
            max-height: 96px;
            opacity: 1;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="gradient-custom"> <!-- 배경색과 애니메이션 -->
    <section class="container vh-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
                <div class="card bg-dark rounded-lg">
                    <div class="card-body p-4 p-sm-5 text-center">
                        <h2 class="text-white">LOGIN</h2>
                        <p class="text-white-50 mt-2 mb-5">구글 계정을 사용하여<br>로그인 해주세요</p>
                        <div class="mb-2">
                            <a th:href="@{/oauth2/authorization/google}" href="/oauth2/authorization/google" id="google-login-link" class="google-login-link d-inline-block">
                                <img th:src="@{/img/googleLogin.png}" src="/img/googleLogin.png" class="img-fluid" alt="Google 로그인">
                            </a>
                            <div id="google-login-loading" class="google-login-loading" aria-live="polite"> <!-- 로딩 상태를 나타내는 요소 -->
                                <div class="spinner-border text-light" role="status">
                                    <span class="sr-only">로딩 중</span>
                                </div>
                                <p class="text-white-50 small mt-3 mb-1">로그인 중입니다</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="/js/oauthLogin.js"></script>
</body>
</html>

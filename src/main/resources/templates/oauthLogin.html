<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog::로그인✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css"> <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"> <!-- Bootstrap Icons CSS -->
    <style>
        /* 배경색과 애니메이션 */
        .gradient-custom {
            background: linear-gradient(135deg,
                #e0f2fe,
                #7dd3fc,
                #38bdf8,
                #bae6fd
            );
            background-size: 240% 240%;
            animation: gradientAnimation 30s ease-in-out infinite;
        }
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 30%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 70%; }
            100% { background-position: 0% 50%; }
        }

        /* 로그인 카드 상단에 블로그 이름을 표시하는 별도 영역 */
        .login-brand {
            padding: 1.25rem 1.5rem;
            background-color: #f0f9ff;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
            color: #334155;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-align: center;
        }

        /* 로그인 안내 문구 전환 */
        .login-message {
            min-height: 3rem;
            transition: opacity 0.8s ease, transform 0.8s ease; /* 0.8초의 부드러운 전환 효과 */
        }
        .login-message.is-changing {
            opacity: 0;
            transform: translateY(4px);
        }
        @media (prefers-reduced-motion: reduce) {
            .login-message {
                transition: none;
            }
        }

        /* 로딩 상태를 나타내는 애니메이션 */
        .google-login-link.is-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .google-login-loading {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.35s ease;
            margin-top: 0;
        }
        .google-login-loading.is-visible {
            max-height: 96px;
            opacity: 1;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="gradient-custom"> <!-- 배경색과 애니메이션 -->
    <section class="container vh-100">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
                <div class="card bg-white rounded-lg">
                    <div class="login-brand">NewTypeBlog</div>
                    <div class="card-body p-4 p-sm-5 text-center">
                        <h2 class="text-dark">LOGIN</h2>
                        <p id="login-message" class="login-message text-secondary mt-2 mb-5">구글 계정을 사용하여<br>로그인 해주세요</p> <!-- 로그인 안내 문구 전환 -->
                        <div class="mb-2">
                            <a th:href="@{/oauth2/authorization/google}" href="/oauth2/authorization/google" id="google-login-link" class="google-login-link d-inline-block">
                                <img th:src="@{/img/googleLogin.png}" src="/img/googleLogin.png" class="img-fluid" alt="Google 로그인">
                            </a>
                            <div id="google-login-loading" class="google-login-loading" aria-live="polite"> <!-- 로딩 상태를 나타내는 애니메이션 -->
                                <div class="spinner-border text-primary" role="status">
                                    <span class="sr-only">로딩 중</span>
                                </div>
                                <p class="text-secondary small mt-3 mb-1">로그인 중입니다</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="/js/oauthLogin.js"></script>
</body>
</html>

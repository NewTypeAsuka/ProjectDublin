<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog::글쓰기✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-bs4.min.css"> <!-- Summernote CSS -->
    <style>
        .site-nav { /* 스크롤 시 nav 영역이 사라지지 않고 상단에 고정되도록 설정 */
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: background-color 0.22s ease, box-shadow 0.22s ease;
        }
        .site-nav.is-stuck {
            background-color: rgba(108, 117, 125, 0.96) !important;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .site-nav .nav-link {
            transition: color 0.18s ease, transform 0.18s ease;
        }
        .site-nav .nav-link:hover,
        .site-nav .nav-link:focus {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="site-header bg-white border-bottom">
        <div class="container py-4 py-md-5 text-center">
            <h1 class="h2 mb-2">✨NewTypeBlog✨</h1>
        </div>
    </header>

    <nav class="navbar navbar-dark bg-secondary py-2 site-nav" id="site-nav">
        <div class="container justify-content-center">
            <div class="navbar-nav flex-row flex-wrap justify-content-center">
                <a class="nav-item nav-link px-3" href="/">홈</a>
            </div>
        </div>
    </nav>

    <main class="container flex-fill py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <article>
                            <input type="hidden" id="article-id" th:value="${article.id}"> <!-- 아이디 정보 저장 -->
                            <header class="mb-4">
                                <div class="text-uppercase text-muted small mb-2">Editor</div>
                                <h2 class="h4 mb-0" th:text="${article.id} != null ? '글 수정' : '새 글 작성'">새 글 작성</h2>
                            </header>
                            <section>
                                <div class="form-group mb-4">
                                    <label for="title" class="small text-muted">제목</label>
                                    <input type="text" class="form-control" placeholder="제목" id="title" th:value="${article.title}">
                                </div>
                                <div class="form-group mb-4">
                                    <label for="content" class="small text-muted">내용</label>
                                    <textarea class="form-control" rows="12" placeholder="내용" id="content" th:text="${article.content}"></textarea>
                                </div>
                            </section>
                            <div class="d-flex flex-wrap">
                                <button th:if="${article.id} != null" type="button" id="modify-btn" class="btn btn-primary btn-sm mr-2 mb-2">수정</button> <!-- id가 있을 때는 수정 버튼을, id가 없을 때는 등록 버튼을 보여줍니다. -->
                                <button th:if="${article.id} == null" type="button" id="create-btn" class="btn btn-primary btn-sm mr-2 mb-2">등록</button>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-white border-top">
        <div class="container py-3 text-center text-secondary small">
            &copy; 2026 NewTypeAsuka. All rights reserved.
        </div>
    </footer>

    <!-- 현재 테스트 환경에서 summernote 사용을 위한 script -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-bs4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/lang/summernote-ko-KR.min.js"></script>
    <script>
        const siteHeader = document.querySelector('.site-header');
        const siteNav = document.getElementById('site-nav');

        if (siteHeader && siteNav) {
            const syncStickyNavState = function () {
                siteNav.classList.toggle('is-stuck', siteHeader.getBoundingClientRect().bottom <= 0);
            };

            syncStickyNavState();
            window.addEventListener('scroll', syncStickyNavState, { passive: true });
            window.addEventListener('resize', syncStickyNavState);
        }

        function plainTextToSummernoteHtml(text) {
            if (!text) {
                return '';
            }

            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function summernoteHtmlToPlainText(html) {
            const normalizedHtml = html
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<\/(p|div|li|h[1-6])>/gi, '\n');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = normalizedHtml;

            return tempDiv.textContent
                .replace(/\u00a0/g, ' ')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        $(function () {
            const $content = $('#content');

            if ($content.length === 0) {
                return;
            }

            const initialPlainText = $content.val();

            $content.summernote({
                lang: 'ko-KR',
                placeholder: '내용을 입력하세요',
                tabsize: 2,
                height: 360,
                toolbar: [
                    ['style', ['bold', 'italic', 'underline', 'clear']],
                    ['para', ['ul', 'ol', 'paragraph']]
                ],
                callbacks: {
                    onInit: function () {
                        $content.summernote('code', plainTextToSummernoteHtml(initialPlainText));
                        $content.val(initialPlainText);
                    },
                    onChange: function (contents) {
                        $content.val(summernoteHtmlToPlainText(contents));
                    }
                }
            });
        });
    </script>
    <script src="/js/article.js"></script>
</body>
</html>

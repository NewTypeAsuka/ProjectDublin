<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>вңЁNewTypeBlogвңЁ</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
    <header class="p-5 text-center bg-light">
        <h1 class="mb-3">вңЁNewTypeBlogвңЁ</h1>
        <h4 class="mb-3">лё”лЎңк·ём—җ мҳӨмӢ  кІғмқ„ нҷҳмҳҒн•©лӢҲлӢӨ.</h4>
    </header>

    <nav class="navbar p-1 mb-3 bg-secondary navbar-dark justify-content-center">
        <a class="navbar-brand" href="/">нҷҲ</a>
        <a class="navbar-brand" href="/articles">кёҖ лӘ©лЎқ</a>
    </nav>

    <section class="container">
        <button type="button" id="create-btn"
                th:onclick="|location.href='@{/new-article}'|"
                class="btn btn-secondary btn-sm mb-3">кёҖм“°кё°</button>
        <div class="row-6" th:each="item : ${articles}"> <!-- article к°ңмҲҳл§ҢнҒј л°ҳліө -->
            <div class="card">
                <div class="card-header" th:text="${item.id}"> <!-- itemмқҳ id м¶ңл Ҙ -->
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${item.title}"></h5>
                    <p class="card-text" th:text="${item.content}"></p>
                    <a th:href="@{/articles/{id}(id=${item.id})}" class="btn btn-primary btn-sm">ліҙлҹ¬к°Җкё°</a>
                </div>
            </div>
            <br>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" onclick="location.href='/logout'">лЎңк·ём•„мӣғ</button>
    </section>

    <footer class="bg-light text-secondary text-center mt-3">
        <p>&copy; 2023 NewTypeBlog. All rights reserved.</p>
    </footer>

    <script src="/js/article.js"></script>
</body>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="bg-white border-bottom">
        <div class="container py-4 py-md-5 text-center">
            <h1 class="h2 mb-2">✨NewTypeBlog✨</h1>
            <p class="mb-0 text-muted">블로그에 오신 것을 환영합니다.</p>
        </div>
    </header>

    <nav class="navbar navbar-dark bg-secondary py-2">
        <div class="container justify-content-center">
            <div class="navbar-nav flex-row flex-wrap justify-content-center">
                <a class="nav-item nav-link px-3" href="/">홈</a>
                <a class="nav-item nav-link px-3" href="/articles">글 목록</a>
            </div>
        </div>
    </nav>

    <main class="container flex-fill py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4">
                    <div class="mb-3 mb-sm-0">
                        <h2 class="h4 mb-1">글 목록</h2>
                        <p class="mb-0 text-muted">작성된 글을 확인하고 새 글을 추가할 수 있습니다.</p>
                    </div>
                    <div class="d-flex flex-wrap">
                        <button type="button" id="create-btn"
                                th:onclick="|location.href='@{/new-article}'|"
                                class="btn btn-primary btn-sm mr-sm-2 mb-2 mb-sm-0">글쓰기</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="location.href='/logout'">로그아웃</button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mb-3" th:each="item : ${articles}"> <!-- article 개수만큼 반복 -->
                    <div class="card-body p-4">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                            <div class="mb-3 mb-md-0 pr-md-4">
                                <div class="text-muted small mb-2">글 번호 <span th:text="${item.id}"></span></div>
                                <h3 class="h5 mb-2 text-break" th:text="${item.title}"></h3>
                                <p class="mb-0 text-secondary text-break" th:text="${item.content}"></p>
                            </div>
                            <a th:href="@{/articles/{id}(id=${item.id})}" class="btn btn-primary btn-sm">보러가기</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-white border-top">
        <div class="container py-3 text-center text-secondary small">
            &copy; 2026 NewTypeAsuka. All rights reserved.
        </div>
    </footer>

    <script src="/js/article.js"></script>
</body>
</html>

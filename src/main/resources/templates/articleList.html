<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 디자인을 위한 viewport 설정 -->
    <title>✨NewTypeBlog✨</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .intro-header { /* 헤더 영역의 연출 */
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
        }
        .intro-header__content {
            position: relative;
            z-index: 1;
        }
        .intro-header__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                rgba(16, 185, 129, 0.38),
                rgba(59, 130, 246, 0.36),
                rgba(99, 102, 241, 0.34),
                rgba(236, 72, 153, 0.30),
                rgba(251, 191, 36, 0.28)
            );
            background-size: 260% 260%;
            pointer-events: none;
            animation: headerIntroMotion 30s ease-out forwards, headerIntroFade 1.1s ease forwards 28.9s;
        }
        @keyframes headerIntroMotion {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 30%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 70%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes headerIntroFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        .intro-header__overlay.is-finished {
            display: none;
        }
        @media (prefers-reduced-motion: reduce) {
            .intro-header__overlay {
                animation: none;
                opacity: 0;
            }
        }

        .site-nav { /* 스크롤 시 nav 영역이 사라지지 않고 상단에 고정되도록 설정 */
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: background-color 0.22s ease, box-shadow 0.22s ease;
        }
        .site-nav.is-stuck {
            background-color: rgba(108, 117, 125, 0.96) !important;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .site-nav .nav-link {
            transition: color 0.18s ease, transform 0.18s ease;
        }
        .site-nav .nav-link:hover,
        .site-nav .nav-link:focus {
            transform: translateY(-1px);
        }

        .article-list-toolbar { /* 글 목록 상단 툴바 영역 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: nowrap;
        }
        .article-list-toolbar__heading {
            min-width: 0;
            margin-bottom: 0;
        }
        .article-list-actions {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .article-list-actions .btn {
            margin: 0;
            white-space: nowrap;
        }

        .article-card-link { /* 글 목록 카드 링크 스타일 */
            display: block;
            margin-bottom: 1rem;
            color: inherit;
            text-decoration: none;
        }
        .article-card-link:hover,
        .article-card-link:focus {
            color: inherit;
            text-decoration: none;
        }
        .article-card {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .article-card-link:hover .article-card,
        .article-card-link:focus .article-card,
        .article-card-link:focus-visible .article-card {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12) !important;
        }
        .article-card-link:focus-visible {
            outline: none;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="intro-header bg-white border-bottom">
        <div class="intro-header__overlay" id="header-intro-overlay" aria-hidden="true"></div>
        <div class="container py-4 py-md-5 text-center intro-header__content">
            <h1 class="h2 mb-2">✨NewTypeBlog✨</h1>
        </div>
    </header>

    <nav class="navbar navbar-dark bg-secondary py-2 site-nav" id="site-nav">
        <div class="container justify-content-center">
            <div class="navbar-nav flex-row flex-wrap justify-content-center">
                <a class="nav-item nav-link px-3" href="/">홈</a>
            </div>
        </div>
    </nav>

    <main class="container flex-fill py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="article-list-toolbar mb-4">
                    <div class="article-list-toolbar__heading">
                        <h2 class="h4 mb-1">포스트</h2>
                    </div>
                    <div class="article-list-actions">
                        <button type="button" id="create-btn"
                                th:onclick="|location.href='@{/new-article}'|"
                                class="btn btn-primary btn-sm">글쓰기</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="location.href='/logout'">로그아웃</button>
                    </div>
                </div>

                <a th:each="item : ${articles}" th:href="@{/articles/{id}(id=${item.id})}" class="article-card-link"> <!-- article 개수만큼 반복 -->
                    <article class="card border-0 shadow-sm article-card">
                        <div class="card-body p-4">
                            <div>
                                <div class="text-muted small mb-2">글 번호 <span th:text="${item.id}"></span></div>
                                <h3 class="h5 mb-2 text-break" th:text="${item.title}"></h3>
                                <p class="mb-0 text-secondary text-break" th:text="${item.content}"></p>
                            </div>
                        </div>
                    </article>
                </a>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-white border-top">
        <div class="container py-3 text-center text-secondary small">
            &copy; 2026 NewTypeAsuka. All rights reserved.
        </div>
    </footer>

    <!-- 헤더 소개 오버레이 스크립트 -->
    <script>
        const headerIntroOverlay = document.getElementById('header-intro-overlay');
        const introHeader = document.querySelector('.intro-header');
        const siteNav = document.getElementById('site-nav');

        if (headerIntroOverlay) {
            window.setTimeout(function () {
                headerIntroOverlay.classList.add('is-finished');
            }, 30000); // 30초 후에 헤더 애니메이션 연출을 제거
        }

        if (introHeader && siteNav) {
            const syncStickyNavState = function () {
                siteNav.classList.toggle('is-stuck', introHeader.getBoundingClientRect().bottom <= 0);
            };

            syncStickyNavState();
            window.addEventListener('scroll', syncStickyNavState, { passive: true });
            window.addEventListener('resize', syncStickyNavState);
        }
    </script>
    <script src="/js/article.js"></script>
</body>
</html>
